# .github/workflows/release.yml
name: Create Release

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Tag for the release (e.g., v1.0.0). Did you remember to bump the version.h?'
        required: true
      release_name:
        description: 'Name of the release'
        required: true
      body:
        description: 'Release description'
        required: false
      run_id:
        description: 'Run ID of the build workflow to download artifacts from'
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    env:
      CLIENT_NAME: E-Client
      TARGET_REPOSITORY: ${{ github.repository }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download Ubuntu artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.CLIENT_NAME }}-ubuntu-22.04
          path: ./artifacts/ubuntu
          github-token: ${{ secrets.GITHUB_TOKEN }}
          repository: ${{ env.TARGET_REPOSITORY }}
          run-id: ${{ github.event.inputs.run_id }}

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.CLIENT_NAME }}-windows-latest
          path: ./artifacts/windows
          github-token: ${{ secrets.GITHUB_TOKEN }}
          repository: ${{ env.TARGET_REPOSITORY }}
          run-id: ${{ github.event.inputs.run_id }}

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.CLIENT_NAME }}-macOS-latest
          path: ./artifacts/macOS
          github-token: ${{ secrets.GITHUB_TOKEN }}
          repository: ${{ env.TARGET_REPOSITORY }}
          run-id: ${{ github.event.inputs.run_id }}

      - name: Rename and Move Artifacts
        run: |
          declare -a multi_ext=("tar.gz" "tar.bz2" "tar.xz" "tar.Z")

          for dir in ./artifacts/*/ ; do
            os=$(basename "$dir")
            # Find the single file in the OS directory
            file=$(find "$dir" -type f | head -n 1)

            if [ -z "$file" ]; then
              echo "No artifact found in directory $dir. Skipping."
              continue
            fi

            filename=$(basename "$file")
            extension=""
            for ext in "${multi_ext[@]}"; do
              if [[ "$filename" == *.$ext ]]; then
                extension="$ext"
                break
              fi
            done
            if [ -z "$extension" ]; then
              extension="${filename##*.}"
            fi

            new_name="${CLIENT_NAME}-${os}.${extension}"
            echo "Renaming $file to $new_name"
            mv "$file" "./artifacts/$new_name"
            echo "Moved $new_name to ./artifacts/"
          done

      - name: List artifacts directory
        run: |
          echo "Listing ./artifacts directory:"
          ls -R ./artifacts

      - name: Create GitHub Release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag_name }}
          name: ${{ github.event.inputs.release_name }}
          body: ${{ github.event.inputs.body }}
          fail_on_unmatched_files: false
          files: |
            ./artifacts/${{ env.CLIENT_NAME }}-ubuntu.tar.xz
            ./artifacts/${{ env.CLIENT_NAME }}-windows.zip
            ./artifacts/${{ env.CLIENT_NAME }}-macOS.dmg